name: Build Portable Apps

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UL_VERSION: "0.5.1"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libpulse0

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libmagic

      - name: Install Python deps (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install .

      - name: Install Python deps (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install .
          python -m pip install python-magic-bin

      - name: Download unifiedlog_iterator binary (Linux)
        if: runner.os == 'Linux'
        run: |
          ASSET="unifiedlog_iterator-v${UL_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          URL="https://github.com/mandiant/macos-UnifiedLogs/releases/download/v${UL_VERSION}/${ASSET}"
          mkdir -p crush/bin/unifiedlog_iterator
          mkdir -p /tmp/ul-extract
          curl -fsSL "$URL" -o /tmp/ul.tar.gz
          tar -xzf /tmp/ul.tar.gz -C /tmp/ul-extract
          find /tmp/ul-extract -name 'unifiedlog_iterator' -type f \
            | head -1 \
            | xargs -I{} cp {} crush/bin/unifiedlog_iterator/unifiedlog_iterator-x86_64-unknown-linux-gnu
          chmod +x crush/bin/unifiedlog_iterator/unifiedlog_iterator-x86_64-unknown-linux-gnu

      - name: Download unifiedlog_iterator binary (macOS)
        if: runner.os == 'macOS'
        run: |
          ASSET="unifiedlog_iterator-v${UL_VERSION}-aarch64-apple-darwin.tar.gz"
          URL="https://github.com/mandiant/macos-UnifiedLogs/releases/download/v${UL_VERSION}/${ASSET}"
          mkdir -p crush/bin/unifiedlog_iterator
          mkdir -p /tmp/ul-extract
          curl -fsSL "$URL" -o /tmp/ul.tar.gz
          tar -xzf /tmp/ul.tar.gz -C /tmp/ul-extract
          find /tmp/ul-extract -name 'unifiedlog_iterator' -type f \
            | head -1 \
            | xargs -I{} cp {} crush/bin/unifiedlog_iterator/unifiedlog_iterator-aarch64-apple-darwin
          chmod +x crush/bin/unifiedlog_iterator/unifiedlog_iterator-aarch64-apple-darwin

      - name: Download unifiedlog_iterator binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ASSET = "unifiedlog_iterator-v$env:UL_VERSION-x86_64-pc-windows-msvc.zip"
          $URL   = "https://github.com/mandiant/macos-UnifiedLogs/releases/download/v$env:UL_VERSION/$ASSET"
          New-Item -ItemType Directory -Force -Path crush\bin\unifiedlog_iterator | Out-Null
          Invoke-WebRequest -Uri $URL -OutFile "$env:TEMP\ul.zip"
          Expand-Archive -Path "$env:TEMP\ul.zip" -DestinationPath "$env:TEMP\ul-extract" -Force
          Get-ChildItem "$env:TEMP\ul-extract" -Recurse -Filter "unifiedlog_iterator.exe" `
            | Select-Object -First 1 `
            | Copy-Item -Destination "crush\bin\unifiedlog_iterator\unifiedlog_iterator-x86_64-pc-windows-msvc.exe"

      - name: Build (PyInstaller) Linux
        if: runner.os == 'Linux'
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name crush \
            --collect-all PySide6 \
            --collect-all magic \
            --add-data "crush/data/formats.db:data" \
            --add-data "crush/bin/unifiedlog_iterator/unifiedlog_iterator-x86_64-unknown-linux-gnu:crush/bin/unifiedlog_iterator/" \
            crush/__main__.py

      - name: Build (PyInstaller) macOS
        if: runner.os == 'macOS'
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name crush \
            --collect-all PySide6 \
            --collect-all magic \
            --add-data "crush/data/formats.db:data" \
            --add-data "crush/bin/unifiedlog_iterator/unifiedlog_iterator-aarch64-apple-darwin:crush/bin/unifiedlog_iterator/" \
            crush/__main__.py

      - name: Build (PyInstaller) Windows
        if: runner.os == 'Windows'
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name crush `
            --collect-all PySide6 `
            --collect-all magic `
            --add-data "crush/data/formats.db;data" `
            --add-data "crush/bin/unifiedlog_iterator/unifiedlog_iterator-x86_64-pc-windows-msvc.exe;crush/bin/unifiedlog_iterator/" `
            crush/__main__.py

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: tar -czf crush-linux-${{ github.ref_name }}.tar.gz -C dist crush

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: tar -czf crush-macos-${{ github.ref_name }}.tar.gz -C dist crush.app

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\\crush\\* -DestinationPath crush-windows-${{ github.ref_name }}.zip

      - name: Upload release asset (Linux)
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: crush-linux-${{ github.ref_name }}.tar.gz

      - name: Upload release asset (macOS)
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: crush-macos-${{ github.ref_name }}.tar.gz

      - name: Upload release asset (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: crush-windows-${{ github.ref_name }}.zip
