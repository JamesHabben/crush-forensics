name: Build Portable Apps

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UL_VERSION: "0.5.1"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Set arch-specific variables for macOS builds
      - name: Set macOS build vars
        if: runner.os == 'macOS'
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            echo "MACOS_UL_BINARY=unifiedlog_iterator-aarch64-apple-darwin" >> $GITHUB_ENV
            echo "MACOS_ARTIFACT=crush-macos-${{ github.ref_name }}.dmg" >> $GITHUB_ENV
          else
            echo "MACOS_UL_BINARY=unifiedlog_iterator-x86_64-apple-darwin" >> $GITHUB_ENV
            echo "MACOS_ARTIFACT=crush-macos-intel-${{ github.ref_name }}.dmg" >> $GITHUB_ENV
          fi

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libpulse0 \
            librsvg2-bin

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libmagic

      - name: Install Python deps (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install .

      - name: Install Python deps (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller Pillow
          python -m pip install .
          python -m pip install python-magic-bin

      - name: Download unifiedlog_iterator binary (Linux)
        if: runner.os == 'Linux'
        run: |
          ASSET="unifiedlog_iterator-v${UL_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          URL="https://github.com/mandiant/macos-UnifiedLogs/releases/download/v${UL_VERSION}/${ASSET}"
          mkdir -p crush/bin/unifiedlog_iterator
          mkdir -p /tmp/ul-extract
          curl -fsSL "$URL" -o /tmp/ul.tar.gz
          tar -xzf /tmp/ul.tar.gz -C /tmp/ul-extract
          find /tmp/ul-extract -name 'unifiedlog_iterator' -type f \
            | head -1 \
            | xargs -I{} cp {} crush/bin/unifiedlog_iterator/unifiedlog_iterator-x86_64-unknown-linux-gnu
          chmod +x crush/bin/unifiedlog_iterator/unifiedlog_iterator-x86_64-unknown-linux-gnu

      - name: Download unifiedlog_iterator binary (macOS)
        if: runner.os == 'macOS'
        run: |
          ASSET="unifiedlog_iterator-v${UL_VERSION}-${MACOS_UL_BINARY#unifiedlog_iterator-}.tar.gz"
          URL="https://github.com/mandiant/macos-UnifiedLogs/releases/download/v${UL_VERSION}/${ASSET}"
          mkdir -p crush/bin/unifiedlog_iterator /tmp/ul-extract
          curl -fsSL "$URL" -o /tmp/ul.tar.gz
          tar -xzf /tmp/ul.tar.gz -C /tmp/ul-extract
          find /tmp/ul-extract -name 'unifiedlog_iterator' -type f \
            | head -1 \
            | xargs -I{} cp {} crush/bin/unifiedlog_iterator/${MACOS_UL_BINARY}
          chmod +x crush/bin/unifiedlog_iterator/${MACOS_UL_BINARY}

      - name: Download unifiedlog_iterator binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ASSET = "unifiedlog_iterator-v$env:UL_VERSION-x86_64-pc-windows-msvc.zip"
          $URL   = "https://github.com/mandiant/macos-UnifiedLogs/releases/download/v$env:UL_VERSION/$ASSET"
          New-Item -ItemType Directory -Force -Path crush\bin\unifiedlog_iterator | Out-Null
          Invoke-WebRequest -Uri $URL -OutFile "$env:TEMP\ul.zip"
          Expand-Archive -Path "$env:TEMP\ul.zip" -DestinationPath "$env:TEMP\ul-extract" -Force
          Get-ChildItem "$env:TEMP\ul-extract" -Recurse -Filter "unifiedlog_iterator.exe" `
            | Select-Object -First 1 `
            | Copy-Item -Destination "crush\bin\unifiedlog_iterator\unifiedlog_iterator-x86_64-pc-windows-msvc.exe"

      - name: Generate icon (Linux → crush_icon_256.png)
        if: runner.os == 'Linux'
        run: rsvg-convert -w 256 -h 256 crush/resources/icons/crush_icon_128.svg -o crush_icon_256.png

      - name: Generate icon (macOS → crush.icns)
        if: runner.os == 'macOS'
        run: QT_QPA_PLATFORM=offscreen python scripts/make_icons.py

      - name: Generate icon (Windows → crush.ico)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          set QT_QPA_PLATFORM=offscreen
          python scripts/make_icons.py

      - name: Build (PyInstaller) Linux
        if: runner.os == 'Linux'
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name crush \
            --collect-all PySide6 \
            --collect-all magic \
            --exclude-module PySide6.QtWebEngineCore \
            --exclude-module PySide6.QtWebEngineWidgets \
            --exclude-module PySide6.QtWebEngineQuick \
            --exclude-module PySide6.QtQml \
            --exclude-module PySide6.QtQuick \
            --exclude-module PySide6.QtQuick3D \
            --exclude-module PySide6.Qt3DAnimation \
            --exclude-module PySide6.Qt3DCore \
            --exclude-module PySide6.Qt3DExtras \
            --exclude-module PySide6.Qt3DInput \
            --exclude-module PySide6.Qt3DLogic \
            --exclude-module PySide6.Qt3DRender \
            --exclude-module PySide6.QtMultimedia \
            --exclude-module PySide6.QtMultimediaWidgets \
            --exclude-module PySide6.QtBluetooth \
            --exclude-module PySide6.QtNfc \
            --exclude-module PySide6.QtSensors \
            --exclude-module PySide6.QtPositioning \
            --exclude-module PySide6.QtRemoteObjects \
            --exclude-module PySide6.QtSerialPort \
            --exclude-module PySide6.QtDataVisualization \
            --exclude-module PySide6.QtCharts \
            --add-data "crush/data/formats.db:data" \
            --add-data "crush/resources/icons/crush_icon_128.svg:crush/resources/icons/" \
            --add-data "crush_icon_256.png:crush/resources/icons/" \
            --add-data "crush/bin/unifiedlog_iterator/unifiedlog_iterator-x86_64-unknown-linux-gnu:crush/bin/unifiedlog_iterator/" \
            crush/__main__.py

      - name: Build (PyInstaller) macOS
        if: runner.os == 'macOS'
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name crush \
            --icon crush.icns \
            --collect-all PySide6 \
            --collect-all magic \
            --exclude-module PySide6.QtWebEngineCore \
            --exclude-module PySide6.QtWebEngineWidgets \
            --exclude-module PySide6.QtWebEngineQuick \
            --exclude-module PySide6.QtQml \
            --exclude-module PySide6.QtQuick \
            --exclude-module PySide6.QtQuick3D \
            --exclude-module PySide6.Qt3DAnimation \
            --exclude-module PySide6.Qt3DCore \
            --exclude-module PySide6.Qt3DExtras \
            --exclude-module PySide6.Qt3DInput \
            --exclude-module PySide6.Qt3DLogic \
            --exclude-module PySide6.Qt3DRender \
            --exclude-module PySide6.QtMultimedia \
            --exclude-module PySide6.QtMultimediaWidgets \
            --exclude-module PySide6.QtBluetooth \
            --exclude-module PySide6.QtNfc \
            --exclude-module PySide6.QtSensors \
            --exclude-module PySide6.QtPositioning \
            --exclude-module PySide6.QtRemoteObjects \
            --exclude-module PySide6.QtSerialPort \
            --exclude-module PySide6.QtDataVisualization \
            --exclude-module PySide6.QtCharts \
            --add-data "crush/data/formats.db:data" \
            --add-data "crush/resources/icons/crush_icon_128.svg:crush/resources/icons/" \
            --add-data "crush/bin/unifiedlog_iterator/${MACOS_UL_BINARY}:crush/bin/unifiedlog_iterator/" \
            crush/__main__.py

      - name: Strip unused Qt frameworks (macOS)
        if: runner.os == 'macOS'
        run: |
          # PyInstaller 6+ bundles into _internal/; fall back to MacOS/ for older versions
          for root in "dist/crush.app/Contents/MacOS/_internal" "dist/crush.app/Contents/MacOS"; do
            lib="$root/PySide6/Qt/lib"
            [ -d "$lib" ] || continue
            for mod in \
              QtWebEngineCore QtWebEngineWidgets QtWebEngineQuick \
              Qt3DAnimation Qt3DCore Qt3DExtras Qt3DInput Qt3DLogic Qt3DRender \
              QtMultimedia QtMultimediaWidgets QtBluetooth QtNfc QtSensors \
              QtPositioning QtRemoteObjects QtSerialPort QtDataVisualization \
              QtCharts QtQml QtQuick QtQuick3D; do
              rm -rf "$lib/${mod}.framework"
            done
            find "$root" -name "QtWebEngineProcess*" -prune -exec rm -rf {} \; 2>/dev/null || true
          done

      - name: Build (PyInstaller) Windows
        if: runner.os == 'Windows'
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name crush `
            --icon crush.ico `
            --collect-all PySide6 `
            --collect-all magic `
            --exclude-module PySide6.QtWebEngineCore `
            --exclude-module PySide6.QtWebEngineWidgets `
            --exclude-module PySide6.QtWebEngineQuick `
            --exclude-module PySide6.QtQml `
            --exclude-module PySide6.QtQuick `
            --exclude-module PySide6.QtQuick3D `
            --exclude-module PySide6.Qt3DAnimation `
            --exclude-module PySide6.Qt3DCore `
            --exclude-module PySide6.Qt3DExtras `
            --exclude-module PySide6.Qt3DInput `
            --exclude-module PySide6.Qt3DLogic `
            --exclude-module PySide6.Qt3DRender `
            --exclude-module PySide6.QtMultimedia `
            --exclude-module PySide6.QtMultimediaWidgets `
            --exclude-module PySide6.QtBluetooth `
            --exclude-module PySide6.QtNfc `
            --exclude-module PySide6.QtSensors `
            --exclude-module PySide6.QtPositioning `
            --exclude-module PySide6.QtRemoteObjects `
            --exclude-module PySide6.QtSerialPort `
            --exclude-module PySide6.QtDataVisualization `
            --exclude-module PySide6.QtCharts `
            --add-data "crush/data/formats.db;data" `
            --add-data "crush/resources/icons/crush_icon_128.svg;crush/resources/icons/" `
            --add-data "crush/bin/unifiedlog_iterator/unifiedlog_iterator-x86_64-pc-windows-msvc.exe;crush/bin/unifiedlog_iterator/" `
            crush/__main__.py

      - name: Package artifact (Linux → AppImage)
        if: runner.os == 'Linux'
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

          mkdir -p AppDir
          cp -r dist/crush AppDir/crush

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/crush/crush" "$@"
          EOF
          chmod +x AppDir/AppRun

          cat > AppDir/crush.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Crush
          Exec=crush
          Icon=crush
          Categories=Utility;Security;
          EOF

          cp crush_icon_256.png AppDir/crush.png

          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run AppDir \
            crush-linux-${{ github.ref_name }}.AppImage

      - name: Package artifact (macOS → DMG)
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "Crush ${{ github.ref_name }}" \
            -srcfolder dist/crush.app \
            -ov -format UDRW -fs HFS+ \
            /tmp/crush_rw.dmg
          hdiutil attach /tmp/crush_rw.dmg -mountpoint /tmp/crush_vol
          ln -s /Applications "/tmp/crush_vol/Applications"
          hdiutil detach /tmp/crush_vol -force
          hdiutil convert /tmp/crush_rw.dmg -format UDBZ -o "${MACOS_ARTIFACT}"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\\crush\\* -DestinationPath crush-windows-${{ github.ref_name }}.zip

      - name: Upload release asset (Linux)
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: crush-linux-${{ github.ref_name }}.AppImage

      - name: Upload release asset (macOS)
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.MACOS_ARTIFACT }}

      - name: Upload release asset (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: crush-windows-${{ github.ref_name }}.zip
