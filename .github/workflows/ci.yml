name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libmagic1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Ruff
        run: python -m ruff check .

      - name: Mypy
        run: python -m mypy crush

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libmagic1 \
            libpulse0

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libmagic

      - name: Install Python deps (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Install Python deps (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]
          python -m pip install python-magic-bin

      - name: Pytest (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          mkdir -p reports
          python -m pytest -q \
            --junit-xml=reports/junit.xml \
            --html=reports/test_report.html \
            --self-contained-html

      - name: Pytest (Windows)
        if: runner.os == 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          New-Item -ItemType Directory -Force -Path reports | Out-Null
          python -m pytest -q `
            --junit-xml=reports/junit.xml `
            --html=reports/test_report.html `
            --self-contained-html
        shell: pwsh

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forensic-test-report-${{ matrix.os }}
          path: reports/
          retention-days: 90
