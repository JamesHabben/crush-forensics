name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libmagic1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Ruff
        run: |
          python -m ruff check .

      - name: Mypy
        run: |
          python -m mypy crush

      - name: Pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest -q
