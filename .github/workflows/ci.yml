name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libmagic1

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Ruff
        run: |
          python -m ruff check .

      - name: Mypy
        run: |
          python -m mypy crush

      - name: Pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          mkdir -p reports
          python -m pytest -q \
            --junit-xml=reports/junit.xml \
            --html=reports/test_report.html \
            --self-contained-html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forensic-test-report
          path: reports/
          retention-days: 90
