name: Nightly Build

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libpulse0

      - name: Set build identifier
        run: |
          python - <<'EOF'
          import pathlib, datetime
          p = pathlib.Path("crush/__init__.py")
          date = datetime.datetime.utcnow().strftime("%Y%m%d")
          p.write_text(p.read_text().replace('__build__ = ""', f'__build__ = "{date}-nightly"'))
          EOF
        shell: bash

      - name: Install Python deps (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install .

      - name: Install Python deps (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install .
          python -m pip install python-magic-bin

      - name: Build (PyInstaller) Linux
        if: runner.os == 'Linux'
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name crush \
            --collect-all PySide6 \
            --collect-all magic \
            --add-data "crush/data/formats.db:data" \
            crush/__main__.py

      - name: Build (PyInstaller) Windows
        if: runner.os == 'Windows'
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name crush `
            --collect-all PySide6 `
            --collect-all magic `
            --add-data "crush/data/formats.db;data" `
            crush/__main__.py

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf crush-linux.tar.gz -C dist crush

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist\\crush\\* -DestinationPath crush-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crush-${{ runner.os == 'Linux' && 'linux' || 'windows' }}
          path: ${{ runner.os == 'Linux' && 'crush-linux.tar.gz' || 'crush-windows.zip' }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: crush-linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: crush-windows

      - name: Delete existing nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --repo ${{ github.repository }} --yes --cleanup-tag || true

      - name: Create nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create nightly \
            --repo ${{ github.repository }} \
            --title "Nightly Build ($(date -u '+%Y-%m-%d'))" \
            --notes "Automated nightly build from \`main\`. Not a stable release." \
            --prerelease \
            crush-linux.tar.gz \
            crush-windows.zip
