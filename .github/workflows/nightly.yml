name: Nightly Build

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UL_VERSION: "0.5.1"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libpulse0

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libmagic

      - name: Set build identifier
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python - <<'EOF'
          import pathlib, datetime, os
          p = pathlib.Path("crush/__init__.py")
          date = datetime.datetime.utcnow().strftime("%Y%m%d")
          sha = os.environ.get("GITHUB_SHA", "")[:7]
          p.write_text(p.read_text().replace('__build__ = ""', f'__build__ = "{date}-nightly-{sha}"'))
          EOF
        shell: bash

      - name: Install Python deps (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install .

      - name: Install Python deps (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install .
          python -m pip install python-magic-bin

      - name: Download unifiedlog_iterator binary (Linux)
        if: runner.os == 'Linux'
        run: |
          ASSET="unifiedlog_iterator-v${UL_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          URL="https://github.com/mandiant/macos-UnifiedLogs/releases/download/v${UL_VERSION}/${ASSET}"
          mkdir -p crush/bin/unifiedlog_iterator
          mkdir -p /tmp/ul-extract
          curl -fsSL "$URL" -o /tmp/ul.tar.gz
          tar -xzf /tmp/ul.tar.gz -C /tmp/ul-extract
          find /tmp/ul-extract -name 'unifiedlog_iterator' -type f \
            | head -1 \
            | xargs -I{} cp {} crush/bin/unifiedlog_iterator/unifiedlog_iterator-x86_64-unknown-linux-gnu
          chmod +x crush/bin/unifiedlog_iterator/unifiedlog_iterator-x86_64-unknown-linux-gnu

      - name: Download unifiedlog_iterator binary (macOS)
        if: runner.os == 'macOS'
        run: |
          ASSET="unifiedlog_iterator-v${UL_VERSION}-aarch64-apple-darwin.tar.gz"
          URL="https://github.com/mandiant/macos-UnifiedLogs/releases/download/v${UL_VERSION}/${ASSET}"
          mkdir -p crush/bin/unifiedlog_iterator
          mkdir -p /tmp/ul-extract
          curl -fsSL "$URL" -o /tmp/ul.tar.gz
          tar -xzf /tmp/ul.tar.gz -C /tmp/ul-extract
          find /tmp/ul-extract -name 'unifiedlog_iterator' -type f \
            | head -1 \
            | xargs -I{} cp {} crush/bin/unifiedlog_iterator/unifiedlog_iterator-aarch64-apple-darwin
          chmod +x crush/bin/unifiedlog_iterator/unifiedlog_iterator-aarch64-apple-darwin

      - name: Download unifiedlog_iterator binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ASSET = "unifiedlog_iterator-v$env:UL_VERSION-x86_64-pc-windows-msvc.zip"
          $URL   = "https://github.com/mandiant/macos-UnifiedLogs/releases/download/v$env:UL_VERSION/$ASSET"
          New-Item -ItemType Directory -Force -Path crush\bin\unifiedlog_iterator | Out-Null
          Invoke-WebRequest -Uri $URL -OutFile "$env:TEMP\ul.zip"
          Expand-Archive -Path "$env:TEMP\ul.zip" -DestinationPath "$env:TEMP\ul-extract" -Force
          Get-ChildItem "$env:TEMP\ul-extract" -Recurse -Filter "unifiedlog_iterator.exe" `
            | Select-Object -First 1 `
            | Copy-Item -Destination "crush\bin\unifiedlog_iterator\unifiedlog_iterator-x86_64-pc-windows-msvc.exe"

      - name: Build (PyInstaller) Linux
        if: runner.os == 'Linux'
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name crush \
            --collect-all PySide6 \
            --collect-all magic \
            --add-data "crush/data/formats.db:data" \
            --add-data "crush/bin/unifiedlog_iterator/unifiedlog_iterator-x86_64-unknown-linux-gnu:crush/bin/unifiedlog_iterator/" \
            crush/__main__.py

      - name: Build (PyInstaller) macOS
        if: runner.os == 'macOS'
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name crush \
            --collect-all PySide6 \
            --collect-all magic \
            --add-data "crush/data/formats.db:data" \
            --add-data "crush/bin/unifiedlog_iterator/unifiedlog_iterator-aarch64-apple-darwin:crush/bin/unifiedlog_iterator/" \
            crush/__main__.py

      - name: Build (PyInstaller) Windows
        if: runner.os == 'Windows'
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --name crush `
            --collect-all PySide6 `
            --collect-all magic `
            --add-data "crush/data/formats.db;data" `
            --add-data "crush/bin/unifiedlog_iterator/unifiedlog_iterator-x86_64-pc-windows-msvc.exe;crush/bin/unifiedlog_iterator/" `
            crush/__main__.py

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: tar -czf crush-linux.tar.gz -C dist crush

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: tar -czf crush-macos.tar.gz -C dist crush.app

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\\crush\\* -DestinationPath crush-windows.zip

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: crush-linux
          path: crush-linux.tar.gz
          retention-days: 1

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: crush-macos
          path: crush-macos.tar.gz
          retention-days: 1

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: crush-windows
          path: crush-windows.zip
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: crush-linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: crush-macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: crush-windows

      - name: Delete existing nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --repo ${{ github.repository }} --yes --cleanup-tag || true

      - name: Create nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create nightly \
            --repo ${{ github.repository }} \
            --title "Nightly Build ($(date -u '+%Y-%m-%d'))" \
            --notes "Automated nightly build from \`main\`. Not a stable release." \
            --prerelease \
            crush-linux.tar.gz \
            crush-macos.tar.gz \
            crush-windows.zip
