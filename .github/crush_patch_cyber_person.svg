<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>crush – Cyber Round Patch</title>
  <desc>Round printed patch for crush-forensics. Easter eggs: wave 3 = "Just keep swimming!" in hex, wave 6 = "Annika is awesome!" in binary.</desc>

  <defs>
    <clipPath id="innerClip">
      <circle cx="250" cy="250" r="212"/>
    </clipPath>
  </defs>

  <!-- outer rings -->
  <circle cx="250" cy="250" r="248" fill="#052e16"/>
  <circle cx="250" cy="250" r="238" fill="#052e16" stroke="#4ade80" stroke-width="2.5"/>
  <circle cx="250" cy="250" r="226" fill="#060f0a"/>

  <!-- === CYBER WAVE BACKGROUND === -->
  <g clip-path="url(#innerClip)">

    <!-- Wave 1 — hex, DFIR terms -->
    <path id="w1" d="M 38,155 Q 90,130 143,155 Q 196,180 250,155 Q 304,130 357,155 Q 410,180 462,155" fill="none"/>
    <text font-family="'Courier New',Courier,monospace" font-size="7" fill="#22c55e" opacity="0.55" letter-spacing="1">
      <textPath href="#w1">0x4446 0x4952 0x4353 0x4C54 0x4954 0x4543 0x4845 0x5820 0x4855 0x4E54</textPath>
    </text>

    <!-- Wave 2 — binary filler -->
    <path id="w2" d="M 38,172 Q 100,148 155,172 Q 210,196 265,172 Q 320,148 375,172 Q 428,196 462,176" fill="none"/>
    <text font-family="'Courier New',Courier,monospace" font-size="7" fill="#16a34a" opacity="0.45" letter-spacing="1">
      <textPath href="#w2">10110100 11001010 01010101 00110011 11110000 10101010 01100011 00110101</textPath>
    </text>

    <!-- Wave 3 — EASTER EGG 1: "Just keep swimming!" in hex -->
    <path id="w3" d="M 38,189 Q 85,167 138,189 Q 190,211 244,189 Q 298,167 351,189 Q 404,211 462,190" fill="none"/>
    <text font-family="'Courier New',Courier,monospace" font-size="7" fill="#22c55e" opacity="0.4" letter-spacing="1">
      <textPath href="#w3">0x4A 0x75 0x73 0x74 0x20 0x6B 0x65 0x65 0x70 0x20 0x73 0x77 0x69 0x6D 0x6D 0x69 0x6E 0x67 0x21</textPath>
    </text>

    <!-- Wave 4 — hex filler -->
    <path id="w4" d="M 38,206 Q 100,183 154,206 Q 208,229 262,206 Q 315,183 369,206 Q 420,229 462,208" fill="none"/>
    <text font-family="'Courier New',Courier,monospace" font-size="7" fill="#15803d" opacity="0.5" letter-spacing="1">
      <textPath href="#w4">0xFF 0x89 0x50 0x4E 0x47 0x0D 0x53 0x51 0x4C 0x69 0x74 0x65 0x20 0x66 0x6F 0x72 0x6D 0x61 0x74</textPath>
    </text>

    <!-- Wave 5 — hex, DFIR formats -->
    <path id="w5" d="M 38,318 Q 95,293 150,318 Q 205,343 260,318 Q 315,293 370,318 Q 420,343 462,320" fill="none"/>
    <text font-family="'Courier New',Courier,monospace" font-size="7.5" fill="#22c55e" opacity="0.5" letter-spacing="1">
      <textPath href="#w5">0x504C 0x4953 0x5420 0x5345 0x4742 0x2041 0x4258 0x4C44 0x4220 0x4845</textPath>
    </text>

    <!-- Wave 6 — EASTER EGG 2: "Annika is awesome!" in binary -->
    <path id="w6" d="M 38,335 Q 88,312 142,335 Q 196,358 252,335 Q 308,312 362,335 Q 416,358 462,337" fill="none"/>
    <text font-family="'Courier New',Courier,monospace" font-size="7.5" fill="#16a34a" opacity="0.42" letter-spacing="1">
      <textPath href="#w6">01000001 01101110 01101110 01101001 01101011 01100001 00100000 01101001 01110011 00100000 01100001 01110111 01100101 01110011 01101111 01101101 01100101 00100001</textPath>
    </text>

    <!-- Wave 7 — hex, more formats -->
    <path id="w7" d="M 38,352 Q 95,329 148,352 Q 200,375 255,352 Q 310,329 364,352 Q 418,375 462,354" fill="none"/>
    <text font-family="'Courier New',Courier,monospace" font-size="7.5" fill="#22c55e" opacity="0.38" letter-spacing="1">
      <textPath href="#w7">0x6C65 0x7665 0x6C64 0x6220 0x7072 0x6F74 0x6F62 0x7566 0x7472 0x6163</textPath>
    </text>

    <!-- Wave 8 — binary filler -->
    <path id="w8" d="M 38,369 Q 90,347 144,369 Q 198,391 253,369 Q 308,347 362,369 Q 416,391 462,371" fill="none"/>
    <text font-family="'Courier New',Courier,monospace" font-size="7.5" fill="#15803d" opacity="0.32" letter-spacing="1">
      <textPath href="#w8">11001010 01010110 10110001 01101001 10100101 01010100 00110011 11001100</textPath>
    </text>

    <!-- Wave 9 — hex filler -->
    <path id="w9" d="M 38,386 Q 88,364 143,386 Q 198,408 253,386 Q 308,364 362,386 Q 416,408 462,388" fill="none"/>
    <text font-family="'Courier New',Courier,monospace" font-size="7.5" fill="#22c55e" opacity="0.22" letter-spacing="1">
      <textPath href="#w9">0x7a69 0x7020 0x7461 0x7220 0x7573 0x6c69 0x6f67 0x6172 0x6368 0x6976</textPath>
    </text>

    <!-- EAC wave crest -->
    <path d="M 38,308 Q 95,280 155,305 Q 215,330 265,300 Q 318,270 375,295 Q 422,316 462,296"
          fill="none" stroke="#4ade80" stroke-width="1.6" opacity="0.55"/>
    <path d="M 38,314 Q 95,286 155,311 Q 215,336 265,306 Q 318,276 375,301 Q 422,322 462,302"
          fill="none" stroke="#22c55e" stroke-width="0.6" opacity="0.25"/>
    <!-- spray -->
    <circle cx="264" cy="293" r="2.2" fill="#4ade80" opacity="0.7"/>
    <circle cx="273" cy="287" r="1.4" fill="#4ade80" opacity="0.5"/>
    <circle cx="256" cy="290" r="1"   fill="#4ade80" opacity="0.35"/>
    <circle cx="374" cy="288" r="1.8" fill="#4ade80" opacity="0.55"/>
    <circle cx="383" cy="283" r="1.2" fill="#4ade80" opacity="0.38"/>
  </g>

  <!-- === ARC TEXT TOP === -->
  <path id="topArc" d="M 55,205 A 202,202 0 0,1 445,205" fill="none"/>
  <text font-family="'Courier New', Courier, monospace" font-size="15" font-weight="700" fill="#4ade80" letter-spacing="4">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">RIDING THE EAC</textPath>
  </text>

  <!-- === ARC TEXT BOTTOM === -->
  <path id="botArc" d="M 65,315 A 198,198 0 0,0 435,315" fill="none"/>
  <text font-family="'Courier New', Courier, monospace" font-size="12" font-weight="600" fill="#86efac" letter-spacing="3.5">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">DFIR WORKBENCH</textPath>
  </text>

  <!-- === TURTLE === -->
  <!-- rear flippers -->
  <path d="M208,264 Q162,278 158,304 Q176,294 212,278 Z" fill="#166534" stroke="#22c55e" stroke-width="1.2"/>
  <path d="M292,264 Q338,278 342,304 Q324,294 288,278 Z" fill="#166534" stroke="#22c55e" stroke-width="1.2"/>
  <!-- front flippers -->
  <path d="M212,148 Q162,128 144,102 Q164,116 216,162 Z" fill="#166534" stroke="#22c55e" stroke-width="1.2"/>
  <path d="M288,148 Q338,128 356,102 Q336,116 284,162 Z" fill="#166534" stroke="#22c55e" stroke-width="1.2"/>

  <!-- shell body -->
  <ellipse cx="250" cy="215" rx="52" ry="72" fill="#15803d"/>

  <!-- full hex pattern -->
  <polygon points="250,185 265,194 265,212 250,221 235,212 235,194" fill="none" stroke="#4ade80" stroke-width="1.8" opacity="1"/>
  <polygon points="250,159 265,168 265,186 250,195 235,186 235,168" fill="none" stroke="#4ade80" stroke-width="1.3" opacity="0.85"/>
  <polygon points="250,133 265,142 265,160 250,169 235,160 235,142" fill="none" stroke="#4ade80" stroke-width="1.1" opacity="0.7"/>
  <polygon points="250,211 265,220 265,238 250,247 235,238 235,220" fill="none" stroke="#4ade80" stroke-width="1.3" opacity="0.82"/>
  <polygon points="250,237 265,246 265,264 250,273 235,264 235,246" fill="none" stroke="#4ade80" stroke-width="1.1" opacity="0.65"/>
  <polygon points="280,170 295,179 295,197 280,206 265,197 265,179" fill="none" stroke="#4ade80" stroke-width="1.2" opacity="0.8"/>
  <polygon points="220,170 235,179 235,197 220,206 205,197 205,179" fill="none" stroke="#4ade80" stroke-width="1.2" opacity="0.8"/>
  <polygon points="280,144 295,153 295,171 280,180 265,171 265,153" fill="none" stroke="#4ade80" stroke-width="1"   opacity="0.65"/>
  <polygon points="220,144 235,153 235,171 220,180 205,171 205,153" fill="none" stroke="#4ade80" stroke-width="1"   opacity="0.65"/>
  <polygon points="280,196 295,205 295,223 280,232 265,223 265,205" fill="none" stroke="#4ade80" stroke-width="1"   opacity="0.62"/>
  <polygon points="220,196 235,205 235,223 220,232 205,223 205,205" fill="none" stroke="#4ade80" stroke-width="1"   opacity="0.62"/>
  <polygon points="280,222 295,231 295,249 280,258 265,249 265,231" fill="none" stroke="#4ade80" stroke-width="0.9" opacity="0.5"/>
  <polygon points="220,222 235,231 235,249 220,258 205,249 205,231" fill="none" stroke="#4ade80" stroke-width="0.9" opacity="0.5"/>

  <!-- shell rim -->
  <ellipse cx="250" cy="215" rx="52" ry="72" fill="none" stroke="#22c55e" stroke-width="2.5"/>

  <!-- head -->
  <ellipse cx="250" cy="135" rx="22" ry="19" fill="#16a34a" stroke="#22c55e" stroke-width="1.8"/>
  <circle cx="240" cy="130" r="5"   fill="#052e16"/>
  <circle cx="241" cy="129" r="2"   fill="#bbf7d0"/>
  <circle cx="260" cy="129" r="5"   fill="#052e16"/>
  <circle cx="261" cy="128" r="2"   fill="#bbf7d0"/>
  <path d="M240 143 Q250 151 260 143" fill="none" stroke="#052e16" stroke-width="1.8" stroke-linecap="round"/>

  <!-- wordmark -->
  <text x="250" y="328"
    font-family="'Courier New', Courier, monospace"
    font-size="34" font-weight="700" fill="#22c55e"
    text-anchor="middle" letter-spacing="1">crush</text>

  <!-- inner border rings -->
  <circle cx="250" cy="250" r="226" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="250" cy="250" r="219" fill="none" stroke="#14532d" stroke-width="1"/>

</svg>
